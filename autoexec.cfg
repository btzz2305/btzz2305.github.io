////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////
游戏设置

// 启用开发者控制台
con_enable "1" // 默认0，1=启用，0=禁用

//HUD
cl_hud_color "12"        //HUD颜色(0--队伍颜色，1--白色，2--亮白色，3--淡蓝色，4--蓝色，5--紫色，6--红色，7--橙色，8--黄色，9--绿色，10--浅绿色，11--粉红色，12--玩家颜色)
cl_teamid_overhead_mode "3"   //在HUD中显示队友位置、名字和装备(0--隔墙不显示队友，1--隔墙显示队友位置，2--隔墙显示队友位置和名字，3--隔墙显示队友位置、名字和装备)
ui_setting_advertiseforhire_auto "0"    //当反恐精英启动时寻找队友 (0--禁用，1-记住上次状态，2--自动)
cl_teamid_overhead_colors_show "1"    //在队伍ID上使用玩家颜色(0--否，1--是)
cl_mute_enemy_team "0"   //将敌人静音(0--否，1--是)
cl_allow_animated_avatars "0"    //允许使用动态头像(0--否，1--是)
cl_hide_avatar_images "0"    //隐藏头像图片(0--全部显示，1--全部隐藏，2--只显示好友)
cl_scoreboard_survivors_always_on "1"   //总是显示生还者人数(0--否，1--是)

//雷达
cl_radar_always_centered "1"       //雷达保持玩家居中
cl_radar_rotate "1"                // 雷达随视角旋转
cl_radar_background_blur "1"        // 模糊背景
cl_radar_background_color "0 0 0 80" // 雷达HUD背景透明度
cl_hud_radar_scale "1"            // 雷达HUD大小
cl_radar_square_with_scoreboard "1" // 切换计分板变方形
cl_hud_bomb_under_radar "1"         // 显示炸弹图标

//狙击枪瞄具
cl_crosshair_sniper_width "1"    // 狙击枪十字线粗细
cl_sniper_delay_unscope "0"    // 关闭开枪后延迟收镜
cl_sniper_auto_rezoom "1"      // 自动重开镜
cl_crosshair_sniper_dot_scale "1"    // 准星大小
sniper_scope_blur "0"                     // 关闭镜边模糊
//投掷物准星
cl_grenadecrosshair_smoke "1"          // 烟雾弹开准星
cl_grenadecrosshair_flash "1"         // 闪光弹开准星
cl_grenadecrosshair_explosive "1"      // 手雷开准星
cl_grenadecrosshair_fire "1"          // 燃烧瓶开准星
cl_grenadecrosshair_decoy "1"          // 诱饵弹开准星
cl_grenadecrosshair_keepusercrosshair "1" // 切道具保留主准星
// 全部0延迟：切出立即显示准星
cl_grenadecrosshairdelay_smoke "0"
cl_grenadecrosshairdelay_flash "0"
cl_grenadecrosshairdelay_explosive "0"
cl_grenadecrosshairdelay_fire "0"
cl_grenadecrosshairdelay_decoy "0"
//伤害预测
cl_predict_body_shot_fx "0"
cl_predict_head_shot_fx "0"
cl_predict_kill_ragdolls "1"

//遥测
cl_hud_telemetry_frametime_show "2"     // 显示FPS 0=从不，1=如果条件恶劣 ，2=总是
cl_hud_telemetry_ping_show "2"         // 显示Ping
cl_hud_telemetry_net_misdelivery_show "1" // 差时显示丢包
// 关闭详细图表
cl_hud_telemetry_net_quality_graph_show "0"
cl_hud_telemetry_serverrecvmargin_graph_show "0"
cl_hud_telemetry_net_detailed "0"

