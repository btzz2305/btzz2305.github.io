//启动项 //+exec autoexec  -high -novid -nojoy  //
+exec 文件名（大小写一致）
-high 高优先级，就是要求CPU处理运算CS时是最高优先级，提高性能的;
-novid 跳过开场动画;
-nojoy 不使用摇杆，可提高少部分性能（目前游戏大部分cfg自带，所以可以设置也可以不用设置);
-freq 165 强制游戏的刷新率 (这个要看你的显示器开的刷新率，不然设置后也无用)。
-fullscreen 以全屏游戏启动
 
// 自动加载写入CFG
host_writeconfig "0" // 默认0，1=启用，0=禁用

