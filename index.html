<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 移动端适配 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人主页</title>
    <!-- 苹果风核心样式：留白、极简、高级感 -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 苹果官方字体 + 全局基础样式 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
            background-color: #f5f5f7; /* 苹果浅灰背景 */
            color: #1d1d1f; /* 苹果标准文字色 */
            line-height: 1.5;
            padding: 60px 20px;
            max-width: 800px;
            margin: 0 auto; /* 居中 + 留白 */
        }

        /* 个人信息头部 */
        .profile {
            text-align: center;
            margin-bottom: 80px; /* 大留白，苹果风核心 */
        }

        .profile h1 {
            font-size: 42px;
            font-weight: 600;
            margin-bottom: 16px;
            letter-spacing: -0.5px;
        }

        .profile p {
            font-size: 18px;
            color: #86868b; /* 苹果次要文字色 */
            max-width: 500px;
            margin: 0 auto;
        }

        /* 下载区域标题 */
        .download-title {
            font-size: 24px;
            font-weight: 500;
            margin-bottom: 30px;
            padding-left: 10px;
        }

        /* 文件下载卡片（极简苹果风） */
        .file-list {
            display: flex;
            flex-direction: column;
            gap: 16px; /* 卡片间距 */
        }

        .file-card {
            background: white;
            border-radius: 12px; /* 苹果圆角 */
            padding: 24px;
            transition: all 0.2s ease; /* 微动效 */
            cursor: pointer;
            text-decoration: none;
            color: #1d1d1f;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* 鼠标悬浮效果（苹果精致动效） */
        .file-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.05);
        }

        .file-name {
            font-size: 16px;
            font-weight: 500;
        }

        .file-tip {
            font-size: 14px;
            color: #86868b;
        }

        /* 底部留白 */
        footer {
            margin-top: 100px;
            text-align: center;
            color: #86868b;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <!-- 个人信息区域（自行修改） -->
    <div class="profile">
        <h1>btzz</h1>
        <p>个人主页</p>
    </div>

    <!-- 文件下载区域 -->
    <h2 class="download-title">文件下载</h2>
    <div class="file-list">
        <!-- ========== 在这里添加/修改你的下载文件 ========== -->
        <a href="autoexec.cfg" class="file-card" download>
            <span class="file-name">cs设置</span>
            <span class="file-tip">点击下载</span>
        </a>

        <a href="文件2.zip（无）" class="file-card" download>
            <span class="file-name">压缩包.zip</span>
            <span class="file-tip">点击下载</span>
        </a>

        <a href="文件3.txt（无）" class="file-card" download>
            <span class="file-name">文本笔记.txt</span>
            <span class="file-tip">点击下载</span>
        </a>
        <!-- ============================================== -->
    </div>

    <footer>
        © 2025 My Personal Homepage
    </footer>
</body>
</html>
